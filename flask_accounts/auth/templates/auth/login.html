<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('auth.static', filename='auth.css') }}">
    {% if auth_custom_css %}
        <link rel="stylesheet" href="{{ auth_custom_css }}">
    {% endif %}
</head>
<body>
    <div class="card">
        <h1>{{ login_banner }}</h1>
        <p class="subtitle">{{ login_banner_msg }}</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.show_login') }}">
            <div class="form-group">
                <label for="username_or_email">Username or Email</label>
                <input
                    type="text"
                    id="username_or_email"
                    name="username_or_email"
                    placeholder="Enter your username or email"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                />
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="bottom-text">
            Need an account? <a href="{{ url_for('auth.show_register') }}">Register</a>
        </p>
    </div>
</body>
</html>
