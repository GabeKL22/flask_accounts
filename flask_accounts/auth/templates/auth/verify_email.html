<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email</title>
    <link rel="stylesheet" href="{{ url_for('auth.static', filename='auth.css') }}">
    {% if auth_custom_css %}
        <link rel="stylesheet" href="{{ auth_custom_css }}">
    {% endif %}
</head>
<body>
    <div class="card">
        <h1>Verify Email</h1>
        <p>We sent a 6-digit code to <strong>{{ email }}</strong></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.verify_email') }}">
            <div class="form-group">
                <input
                    type="text"
                    name="verification_code"
                    maxlength="6"
                    placeholder="Enter 6-digit code"
                    required
                />
            </div>
            <button type="submit">Verify Email</button>
        </form>

        <form method="POST" action="{{ url_for('auth.resend_code') }}">
            <button type="submit" class="secondary-btn">Resend Code</button>
        </form>
    </div>
</body>
</html>
